# ============================================
# Configuración de MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_taller
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# Configuración de JPA y Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Configuración de la aplicación
# ============================================
server.port=8080
spring.application.name=jwt-taller

# ============================================
# Configuración de JWT
# ============================================
# Clave secreta para firmar los JWT (CAMBIAR EN PRODUCCIÓN)
jwt.secret=mySecretKeyForJWTSigningThatMustBeAtLeast256BitsLongForHS256AlgorithmSecurityPurposes123456789012345
# Tiempo de expiración del access token en milisegundos (15 minutos=900000)
jwt.expiration.access=30000
# Tiempo de expiración del refresh token en milisegundos (7 días)
jwt.expiration.refresh=604800000

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.jwt=DEBUG
